version: ‘3.9’
services:
web:
build:
context: .
dockerfile: Dockerfile.web
ports:
- “3000:3000”
environment:
- NODE_ENV=production
depends_on:
- agent
- remote-core
restart: unless-stopped
agent:
build:
context: .
dockerfile: Dockerfile.agent
ports:
- “8765:8765”
restart: unless-stopped
remote-core:
build:
context: .
dockerfile: Dockerfile.remote
ports:
- “9000:9000”
restart: unless-stopped
