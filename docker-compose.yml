version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8765:8765"

  remote:
    build:
      context: .
      dockerfile: Dockerfile.remote
    ports:
      - "9000:9000"
